<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    </div>

    <h2 class="text-center mb-4">Student Records</h2>

    <input type="text" class="form-control mb-4" placeholder="Search student">

    <div class="row" id="container">
        <div>id="Json"</div>

    </div>

</div>

<script>

const students = [

{name:"BHAVYA",branch:"AI",cgpa:"9.1"},
{name:"ANKITA",branch:"CSE",cgpa:"8.9"},
{name:"ARPAN",branch:"ECE",cgpa:"8.5"},
{name:"JOHN",branch:"IT",cgpa:"8.0"},
{name:"AARAV",branch:"AI",cgpa:"9.2"},
{name:"AYUSH",branch:"CSE",cgpa:"8.7"},
{name:"Chala Ja",branch:"ECE",cgpa:"8.1"},
{name:"AKHIL",branch:"IT",cgpa:"8.8"},
{name:"ABHAY",branch:"AI",cgpa:"8.9"},
{name:"AKASH",branch:"AI",cgpa:"8.1"}

];

let html="";

for(let i=0;i<students.length;i++){

html += `
<div class="col-md-4 mb-3">

<div class="card shadow">

<div class="card-body">

<h4>${students[i].name}</h4>

<button class="btn btn-primary btn-sm mt-2"
onclick="toggleDetails(this)">
Show Details
</button>

<div class="details mt-3" style="display:none">

<p><strong>Branch:</strong> ${students[i].branch}</p>

<p><strong>CGPA:</strong> ${students[i].cgpa}</p>

</div>

</div>

</div>

</div>
`;

}

document.getElementById("container").innerHTML = html;

function toggleDetails(button){

let details = button.nextElementSibling;

if(details.style.display==="none"){

details.style.display="block";
button.innerHTML="Hide Details";

}else{

details.style.display="none";
button.innerHTML="Show Details";

}

};

document.getElementaryById("json").innerHTML=JSON.stringify(students,["name","cgpa"],4);

// 3. replacer (function)
function replace(key,value){
    if (key=="cgpa")
    return undefined;
return value
}

</script>

</body>
</html>
